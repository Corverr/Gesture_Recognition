# ============================================
# КОНФИГУРАЦИЯ ДЛЯ ДАТАСЕТА SLOVO
# ============================================

dataset:
  name: "slovo"
  data_dir: "data/raw/"
  annotation_file: "data/raw/annotations.csv"
  processed_dir: "data/processed/"
  num_classes: 1000                # Всего жестов в датасете
  num_frames: 16                   # Сколько кадров берем из видео
  frame_size: 224                  # Размер кадра (224x224)
  batch_size: 16                   # Сколько примеров за раз
  num_workers: 4                   # Потоков для загрузки

# ============================================
# НАСТРОЙКИ ОБУЧЕНИЯ
# ============================================

training:
  epochs: 30                       # Количество эпох
  learning_rate: 0.001             # Скорость обучения
  optimizer: "adam"                # Оптимизатор
  scheduler: "cosine"              # Планировщик скорости
  early_stopping_patience: 10      # Остановка, если нет улучшений
  device: "cuda"                   # cuda или cpu
  seed: 42                         # Для воспроизводимости

# ============================================
# КАКИЕ МОДЕЛИ БУДЕМ ОБУЧАТЬ
# ============================================

models:
  - "cnn_lstm"
  - "i3d"
  - "tsm"
  - "mvit"
  - "transformer"

# ============================================
# МЕТРИКИ
# ============================================

evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "top5_accuracy"]